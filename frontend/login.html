
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Rwandan Youth Worship</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            luxuryGold: '#D4AF37',
            luxuryDark: '#0B1F1A',
            deepBlack: '#050A0A',
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #050A0A, #0B1F1A);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    h1, h2 { font-family: 'Playfair Display', serif; }

    .animated-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 30% 70%, rgba(212,175,55,0.07) 0%, transparent 45%),
        radial-gradient(circle at 70% 30%, rgba(212,175,55,0.05) 0%, transparent 55%);
    }
    .particle {
      position: absolute;
      background: rgba(212,175,55,0.35);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(212,175,55,0.5);
      animation: float 28s infinite linear;
      pointer-events: none;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) scale(0.15); opacity: 0; }
      15%  { opacity: 0.7; }
      85%  { opacity: 0.7; }
      100% { transform: translateY(-160vh) scale(0.7); opacity: 0; }
    }

    .login-card {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1.3s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.4s;
      width: 100%;
      max-width: 480px;
      background: rgba(5,10,10,0.78);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 1.5rem;
      padding: 2.5rem 1.75rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      position: relative;
      z-index: 10;
    }
    @media (min-width: 640px) {
      .login-card { padding: 3.5rem 2.5rem; max-width: 520px; }
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    input:focus {
      outline: none;
      border-color: #D4AF37;
      box-shadow: 0 0 0 4px rgba(212,175,55,0.22);
    }
  </style>
</head>
<body>
  <div class="animated-bg"></div>

  <div class="login-card">
    <div class="absolute -top-24 left-1/2 -translate-x-1/2 w-72 h-72 bg-luxuryGold/8 rounded-full blur-3xl pointer-events-none"></div>

    <div class="text-center mb-10">
      <h1 class="text-4xl sm:text-5xl font-bold text-luxuryGold tracking-wide drop-shadow-md">
        Welcome Back
      </h1>
      <p class="mt-3 text-base sm:text-lg text-gray-300">
        Reconnect with your spiritual family. Enter the sanctuary of worship.
      </p>
    </div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">Email or Username</label>
        <input id="identifier" type="text" required
               class="w-full px-4 py-3.5 bg-black/35 border border-gray-600 rounded-lg text-white placeholder-gray-500 text-base focus:border-luxuryGold transition-all"
               placeholder="Email or username" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
        <input id="password" type="password" required
               class="w-full px-4 py-3.5 bg-black/35 border border-gray-600 rounded-lg text-white placeholder-gray-500 text-base focus:border-luxuryGold transition-all"
               placeholder="********" />
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center text-gray-400">
          <input type="checkbox" class="mr-2 accent-luxuryGold h-4 w-4" />
          Remember me
        </label>
        <a href="#" class="text-luxuryGold hover:underline">Forgot password?</a>
      </div>

      <button type="submit"
              class="w-full py-4 bg-luxuryGold text-black font-bold text-lg rounded-full shadow-xl hover:bg-luxuryGold/90 hover:shadow-2xl transform hover:scale-[1.02] transition-all duration-300">
        Enter Sanctuary
      </button>

      <div class="relative my-8">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-700"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-5 bg-deepBlack/90 text-gray-400">or continue with</span>
        </div>
      </div>

      <button type="button" id="googleBtn"
              class="w-full flex items-center justify-center gap-3 py-4 border border-gray-600 rounded-full font-medium text-base sm:text-lg shadow-lg hover:shadow-xl transition-all duration-300 bg-white text-gray-800">
        Continue with Google
      </button>
    </form>

    <p class="mt-10 text-center text-gray-400 text-sm sm:text-base">
      New to the family? <a href="register.html" class="text-luxuryGold hover:underline font-medium">Create your account</a>
    </p>
  </div>

  <script>
    // Floating particles
    (function initParticles() {
      const bg = document.querySelector('.animated-bg');
      if (!bg) return;
      for (let i = 0; i < 16; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 5 + 2.5;
        p.style.width = p.style.height = size + 'px';
        p.style.left = (Math.random() * 100) + '%';
        p.style.top = (Math.random() * 100) + '%';
        p.style.animationDelay = (Math.random() * 18) + 's';
        p.style.animationDuration = (24 + Math.random() * 35) + 's';
        bg.appendChild(p);
      }
    })();

    document.getElementById('googleBtn').addEventListener('click', () => {
      alert('Google Sign-In coming soon. Integrate Firebase or Google OAuth to enable this.');
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      if (!identifier || !password) {
        alert('Please enter your email/username and password');
        return;
      }

      try {
        const response = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });

        const result = await response.json();
        if (!response.ok) {
          throw new Error(result.message || 'Login failed. Check your credentials.');
        }

        localStorage.setItem('token', result.token);
        localStorage.setItem('user', JSON.stringify(result.user));

        const firstName = result?.user?.firstName || 'friend';
        alert('Welcome back, ' + firstName + '!');

        // Role-based redirect (match existing files in /frontend)
        const role = String(result?.user?.role || '').toLowerCase();
        const landingByRole = {
          youth: './youth.html',
          school_admin: './dashboard/school-admin.html',
          pastor: './dashboard/pastor.html',
          super_admin: './dashboard/super-admin.html',
        };
        const redirectUrl = landingByRole[role] || './youth.html';

        setTimeout(() => {
          window.location.assign(redirectUrl);
        }, 800);
      } catch (err) {
        console.error('Login error:', err);
        alert('Sorry - ' + err.message + '\nPlease try again.');
      }
    });
  </script>
</body>
</html>
